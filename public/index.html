<!DOCTYPE html>

            </div>
            <span class="contact-arrow">›</span>
          </a>

          <a href="mailto:info@ayurasayani.com" class="contact-row">

              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#b8933f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

            <div class="contact-info">
              <div class="contact-type">Email</div>
              <div class="contact-value">info@ayurasayani.com</div>
            </div>
            <span class="contact-arrow">›</span>
